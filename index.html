<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoofyx</title>
  <meta
    name="description"
    content="A stylish Linktree-style landing page for your socials, projects, and favorite links."
  >
  <link rel="icon" type="image/gif" href="assets/scoofy-icon.gif?v=20260409" id="site-favicon">
  <link rel="preload" as="image" href="assets/scoofy-icon.gif?v=20260409">
  <link rel="preload" as="video" href="assets/backgrounds/background-placeholder.mp4" type="video/mp4">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Manrope:wght@400;500;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body class="pre-enter overlay-active">
  <div class="bg-video-wrap" id="bg-video-wrap" hidden aria-hidden="true">
    <video class="bg-video" id="bg-video" autoplay muted loop playsinline preload="auto">
      <source src="assets/backgrounds/background-placeholder.mp4" type="video/mp4">
    </video>
  </div>
  <div class="vhs-overlay" aria-hidden="true"></div>
  <canvas class="snow-layer" id="snow-layer" aria-hidden="true" hidden></canvas>

  <div class="entry-overlay" id="entry-overlay" aria-label="Click to enter">
    <h2 id="entry-title">click to enter...</h2>
  </div>

  <section class="badge-modal" id="badge-modal" hidden aria-modal="true" role="dialog" aria-labelledby="badge-modal-title">
    <div class="badge-modal-panel">
      <p class="badge-modal-kicker" id="badge-modal-kicker"></p>
      <h3 id="badge-modal-title"></h3>
      <p id="badge-modal-text"></p>
      <div class="badge-modal-actions">
        <button type="button" id="badge-modal-action" hidden>Open</button>
        <button type="button" id="badge-modal-close">Close</button>
      </div>
    </div>
  </section>

  <button class="sidebar-toggle" type="button" id="sidebar-toggle" aria-expanded="false" aria-controls="sidebar-panel" aria-label="Open sidebar">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <aside class="sidebar" id="sidebar-panel" aria-hidden="true">
    <div class="sidebar-header">
      <p class="sidebar-label">Navigation</p>
      <button class="sidebar-close" type="button" id="sidebar-close" aria-label="Close sidebar">Close</button>
    </div>
    <nav class="sidebar-nav">
      <button class="sidebar-link active" type="button" id="sidebar-home" aria-label="Home">
        <img src="assets/home.png" alt="" id="sidebar-home-icon" hidden>
        <span id="sidebar-home-label">Home</span>
      </button>
      <a class="sidebar-link" href="arts.html" id="sidebar-arts" aria-label="Arts">
        <img src="assets/arts.png" alt="" id="sidebar-arts-icon" hidden>
        <span id="sidebar-arts-label">Arts</span>
      </a>
      <a class="sidebar-link" href="game.html" id="sidebar-game" aria-label="Game">
        <img src="assets/game.png" alt="" id="sidebar-game-icon" hidden>
        <span id="sidebar-game-label">Game</span>
      </a>
    </nav>
  </aside>

  <div class="sidebar-backdrop" id="sidebar-backdrop" hidden></div>

  <div class="page-shell">
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <div class="side-sign" aria-hidden="true">
      <span class="side-sign-text" id="side-sign-text">scoofy.xyz</span>
    </div>

    <button class="mute-toggle" type="button" id="mute-toggle" aria-pressed="true" aria-label="Toggle audio">
      <img src="assets/volume.png" alt="" id="mute-icon" hidden>
      <span id="mute-label">Audio</span>
    </button>

    <main class="card">
      <section class="top-meta reveal" aria-label="Profile details">
        <a class="meta-chip location-chip" href="#" id="location-chip" hidden>
          <img src="assets/location.png" alt="" id="location-icon" hidden>
          <span class="meta-chip-fallback" id="location-fallback" aria-hidden="true">+</span>
          <span id="location-label">Romania</span>
        </a>
        <article class="meta-chip visits-chip" id="visits-chip" hidden aria-label="Visit count">
          <span class="meta-chip-fallback" aria-hidden="true">#</span>
          <span id="visits-label">0 visits</span>
        </article>
      </section>

      <section class="hero reveal">
        <div class="avatar">
          <img
            src="assets/scoofy-icon.gif?v=20260409"
            alt="Profile icon"
            class="avatar-image"
          >
          <span class="avatar-fallback" hidden>SC</span>
        </div>
        <p class="eyebrow" id="profile-subtitle" hidden></p>
        <h1 id="profile-name">Scoof</h1>
        <p class="handle" id="profile-handle">@scoofyx</p>
        <p class="bio" id="profile-bio"></p>
      </section>

      <section class="badges reveal" aria-label="Profile badges" id="badge-list">
        <noscript>
          <p>Add badge icons in <code>settings.txt</code>.</p>
        </noscript>
      </section>

      <section class="mode-controls reveal" aria-label="Interface mode" id="mode-controls">
        <button class="mode-toggle" type="button" id="mode-toggle" aria-pressed="false" aria-label="Switch to advanced mode">
          <span class="mode-toggle-track">
            <span class="mode-toggle-thumb"></span>
          </span>
          <span class="mode-toggle-text" id="mode-toggle-text">Simple</span>
        </button>
      </section>

      <section class="controls reveal" aria-label="Link filters" id="filter-controls">
        <noscript>
          <p>Enable JavaScript to load your categories and links.</p>
        </noscript>
      </section>

      <section class="view-controls reveal" aria-label="View mode">
        <button class="view-toggle" type="button" data-view="buttons">Buttons</button>
        <button class="view-toggle active" type="button" data-view="list">List</button>
      </section>

      <section class="links list-view" id="links-list" aria-live="polite">
        <noscript>
          <p>Enable JavaScript to load your link cards from the template file.</p>
        </noscript>
      </section>

    </main>
  </div>

  <audio id="bg-music" loop preload="auto"></audio>
  <div class="cursor-dot" id="cursor-dot" aria-hidden="true"></div>
